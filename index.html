<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Perpetuo Pro</title>
    <style>
        :root {
            --bg: #0e0e14;
            --surface: #16161f;
            --border: #2a2a3d;
            --gold: #c9a84c;
            --white: #f0ede6;
            --muted: #6b6b8a;
            --holiday: #e05c6a;
            --task-bg: #4caf7d;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        select, input, button {
            background: var(--surface);
            color: var(--white);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 4px;
        }

        button {
            background: var(--gold);
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
        }

        /* Cuadrícula del Calendario */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .day-header {
            background: var(--surface);
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: var(--gold);
        }

        .day-cell {
            background: var(--bg);
            min-height: 120px;
            padding: 5px;
            position: relative;
        }

        .day-num { font-size: 0.9em; margin-bottom: 5px; display: block; }
        .is-weekend { background: #1a1a24; }
        .is-holiday { color: var(--holiday); font-weight: bold; }

        /* Formato Gantt / Tareas */
        .gantt-item {
            font-size: 0.75em;
            padding: 2px 5px;
            margin-bottom: 2px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }
        .item-task { background: var(--task-bg); }
        .item-holiday { background: var(--holiday); }

        /* Secciones de Datos (Abajo) */
        .data-sections {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .section-card {
            background: var(--surface);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .section-card h3 { color: var(--gold); margin-bottom: 15px; font-size: 1.1em; }
        
        .form-group { margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8em; color: var(--muted); }

        table { width: 100%; font-size: 0.8em; margin-top: 10px; border-collapse: collapse; }
        th { text-align: left; color: var(--gold); border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Calendario Perpetuo</h1>
        <div>
            <select id="monthSel"></select>
            <input type="number" id="yearSel" value="2024" style="width: 80px;">
            <button onclick="renderCalendar()">Generar</button>
        </div>
    </header>

    <div id="calendar" class="calendar-grid"></div>

    <div class="data-sections">
        <div class="section-card">
            <h3>1. Tareas Recurrentes (Días Hábiles)</h3>
            <div class="form-group">
                <input type="text" id="recName" placeholder="Nombre tarea">
                <label>Inicia en día hábil #:</label>
                <input type="number" id="recStart" value="1">
                <label>Duración (días):</label>
                <input type="number" id="recDuration" value="1">
                <button onclick="addRec()">Añadir</button>
            </div>
            <table id="tableRec"><thead><tr><th>Tarea</th><th>Inicio</th><th>Dur</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="section-card">
            <h3>2. Tareas No Recurrentes</h3>
            <div class="form-group">
                <input type="text" id="nonRecName" placeholder="Nombre tarea">
                <label>Día específico:</label>
                <input type="number" id="nonRecDay" value="1">
                <label>Duración (días):</label>
                <input type="number" id="nonRecDuration" value="1">
                <button onclick="addNonRec()">Añadir</button>
            </div>
            <table id="tableNonRec"><thead><tr><th>Tarea</th><th>Día</th><th>Dur</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="section-card">
            <h3>3. Días Festivos (México)</h3>
            <div class="form-group">
                <input type="text" id="holName" placeholder="Descripción">
                <label>Día específico:</label>
                <input type="number" id="holDay" value="1">
                <button onclick="addHoliday()">Añadir</button>
            </div>
            <table id="tableHol"><thead><tr><th>Descripción</th><th>Día</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<script>
    const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const daysArr = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];

    // Datos persistentes
    let dataRec = [];
    let dataNonRec = [];
    let dataHolidays = [
        { name: "Año Nuevo", day: 1 },
        { name: "Constitución", day: 5 }, // Ejemplo simplificado
        { name: "Benito Juárez", day: 21 },
        { name: "Navidad", day: 25 }
    ];

    window.onload = () => {
        const mSel = document.getElementById('monthSel');
        months.forEach((m, i) => mSel.innerHTML += `<option value="${i}">${m}</option>`);
        mSel.value = new Date().getMonth();
        document.getElementById('yearSel').value = new Date().getFullYear();
        renderCalendar();
    };

    function addRec() {
        dataRec.push({ name: document.getElementById('recName').value, start: parseInt(document.getElementById('recStart').value), dur: parseInt(document.getElementById('recDuration').value) });
        updateTables(); renderCalendar();
    }

    function addNonRec() {
        dataNonRec.push({ name: document.getElementById('nonRecName').value, day: parseInt(document.getElementById('nonRecDay').value), dur: parseInt(document.getElementById('nonRecDuration').value) });
        updateTables(); renderCalendar();
    }

    function addHoliday() {
        dataHolidays.push({ name: document.getElementById('holName').value, day: parseInt(document.getElementById('holDay').value) });
        updateTables(); renderCalendar();
    }

    function updateTables() {
        document.querySelector('#tableRec tbody').innerHTML = dataRec.map(d => `<tr><td>${d.name}</td><td>${d.start}</td><td>${d.dur}</td></tr>`).join('');
        document.querySelector('#tableNonRec tbody').innerHTML = dataNonRec.map(d => `<tr><td>${d.name}</td><td>${d.day}</td><td>${d.dur}</td></tr>`).join('');
        document.querySelector('#tableHol tbody').innerHTML = dataHolidays.map(d => `<tr><td>${d.name}</td><td>${d.day}</td></tr>`).join('');
    }

    function isBusinessDay(date) {
        const day = date.getDay();
        const isWeekend = (day === 0 || day === 6);
        const isHoliday = dataHolidays.some(h => h.day === date.getDate());
        return !isWeekend && !isHoliday;
    }

    function renderCalendar() {
        const month = parseInt(document.getElementById('monthSel').value);
        const year = parseInt(document.getElementById('yearSel').value);
        const container = document.getElementById('calendar');
        container.innerHTML = "";

        // Encabezados
        daysArr.forEach(d => container.innerHTML += `<div class="day-header">${d}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        // Ajuste para que Lunes sea 0
        let offset = firstDay === 0 ? 6 : firstDay - 1;

        // Celdas vacías inicio
        for(let i=0; i<offset; i++) container.innerHTML += `<div class="day-cell"></div>`;

        // Generar lista de días hábiles del mes
        let businessDays = [];
        for(let d=1; d<=daysInMonth; d++) {
            let curDate = new Date(year, month, d);
            if(isBusinessDay(curDate)) businessDays.push(d);
        }

        // Crear Celdas
        for(let d=1; d<=daysInMonth; d++) {
            let curDate = new Date(year, month, d);
            let dayOfWeek = curDate.getDay();
            let holiday = dataHolidays.find(h => h.day === d);
            let weekendClass = (dayOfWeek === 0 || dayOfWeek === 6) ? 'is-weekend' : '';
            let holidayClass = holiday ? 'is-holiday' : '';

            let cellHtml = `<div class="day-cell ${weekendClass}" id="day-${d}">
                <span class="day-num ${holidayClass}">${d} ${holiday ? '- ' + holiday.name : ''}</span>
                <div class="tasks-container" id="task-day-${d}"></div>
            </div>`;
            container.innerHTML += cellHtml;
        }

        // Dibujar Tareas (Lógica Gantt simple)
        // 1. Recurrentes
        dataRec.forEach(task => {
            let startIdx = task.start - 1;
            if(businessDays[startIdx]) {
                for(let i=0; i < task.dur; i++) {
                    let dayNum = businessDays[startIdx + i];
                    if(dayNum) addLabelToCell(dayNum, task.name, 'item-task');
                }
            }
        });

        // 2. No Recurrentes
        dataNonRec.forEach(task => {
            for(let i=0; i < task.dur; i++) {
                let dayNum = task.day + i;
                if(dayNum <= daysInMonth) addLabelToCell(dayNum, task.name, 'item-task');
            }
        });

        updateTables();
    }

    function addLabelToCell(day, text, className) {
        const target = document.getElementById(`task-day-${day}`);
        if(target) {
            target.innerHTML += `<div class="gantt-item ${className}">${text}</div>`;
        }
    }
</script>

</body>
</html>
