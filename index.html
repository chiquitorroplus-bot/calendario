<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario Gantt Pro</title>

<style>

body{
font-family:system-ui;
background:#f3f3f3;
padding:20px;
}

h1{
margin-top:0;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

button{
padding:6px 10px;
cursor:pointer;
}

.panel{
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 1px 4px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.calendar{
border-collapse:collapse;
width:100%;
table-layout:fixed;
font-size:13px;
}

.calendar th,
.calendar td{
border:1px solid #ddd;
height:90px;
vertical-align:top;
position:relative;
padding:3px;
}

.calendar th{
background:#fafafa;
}

.day{
position:absolute;
top:3px;
right:4px;
font-size:11px;
font-weight:600;
}

.festivo{
background:#ffeaea;
}

.tarea{
font-size:9px;
color:white;
padding:1px 4px;
border-radius:3px;
margin-top:14px;
display:inline-block;
}

.rec{
background:#1976d2;
}

.norec{
background:#388e3c;
}

.taskItem{
font-size:12px;
margin:3px 0;
}

</style>
</head>

<body>

<h1>Calendario Gantt</h1>

<div class="controls">

<button id="prev">◀</button>
<button id="today">Hoy</button>
<button id="next">▶</button>

<div id="titulo"></div>

</div>

<div class="panel">

<h3>Tarea recurrente (solo días hábiles)</h3>

<input id="recNombre" placeholder="Nombre">

<input id="recInicio" type="number" min="1" max="31" value="1">

<input id="recDur" type="number" value="5">

<button id="addRec">Agregar</button>

<div id="listaRec"></div>

</div>

<div class="panel">

<h3>Tarea no recurrente</h3>

<input id="nrNombre" placeholder="Nombre">

<input id="nrInicio" type="number" value="1">

<input id="nrDur" type="number" value="2">

<button id="addNr">Agregar</button>

<div id="listaNr"></div>

</div>

<table class="calendar">

<thead>

<tr>

<th>Lunes</th>
<th>Martes</th>
<th>Miércoles</th>
<th>Jueves</th>
<th>Viernes</th>
<th>Sábado</th>
<th>Domingo</th>

</tr>

</thead>

<tbody id="body"></tbody>

</table>

<script>

let hoy=new Date()

let mes=hoy.getMonth()
let anio=hoy.getFullYear()

let rec=JSON.parse(localStorage.getItem("rec")||"[]")
let nr=JSON.parse(localStorage.getItem("nr")||"[]")

const meses=[
"Enero","Febrero","Marzo","Abril","Mayo","Junio",
"Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
]

function save(){

localStorage.setItem("rec",JSON.stringify(rec))
localStorage.setItem("nr",JSON.stringify(nr))

}

function lunesDeSemana(fecha){

let d=new Date(fecha)
let day=d.getDay()
let diff=d.getDate()-day+ (day===0?-6:1)

return new Date(d.setDate(diff))

}

function festivosMX(a,m){

let f=[]

if(m===0)f.push(1)

if(m===4)f.push(1)

if(m===8)f.push(16)

if(m===11)f.push(25)

function nthMonday(n,month){

let d=new Date(a,month,1)

while(d.getDay()!=1)d.setDate(d.getDate()+1)

d.setDate(d.getDate()+7*(n-1))

return d.getDate()

}

if(m===1)f.push(nthMonday(1,1))
if(m===2)f.push(nthMonday(3,2))
if(m===10)f.push(nthMonday(3,10))

return f

}

function esLaboral(d,fest){

let wd=d.getDay()

return wd!=0 && wd!=6 && !fest.includes(d.getDate())

}

function generar(){

document.getElementById("titulo").innerText=meses[mes]+" "+anio

let body=document.getElementById("body")
body.innerHTML=""

let first=new Date(anio,mes,1)
let last=new Date(anio,mes+1,0)

let fest=festivosMX(anio,mes)

let start=lunesDeSemana(first)

for(let w=0;w<6;w++){

let tr=document.createElement("tr")

for(let d=0;d<7;d++){

let td=document.createElement("td")

let date=new Date(start)

date.setDate(start.getDate()+w*7+d)

let num=date.getDate()

if(date.getMonth()==mes){

let div=document.createElement("div")
div.className="day"
div.innerText=num
td.appendChild(div)

if(fest.includes(num))td.classList.add("festivo")

rec.forEach(t=>{

let dia=new Date(anio,mes,t.inicio)
let count=0

while(count<t.dur){

if(esLaboral(dia,fest)){

if(dia.getDate()==num){

let bar=document.createElement("div")
bar.className="tarea rec"
bar.innerText=t.nombre
td.appendChild(bar)

}

count++

}

dia.setDate(dia.getDate()+1)

}

})

nr.forEach(t=>{

let dia=new Date(anio,mes,t.inicio)

for(let i=0;i<t.dur;i++){

if(dia.getDate()==num && dia.getMonth()==mes){

let bar=document.createElement("div")
bar.className="tarea norec"
bar.innerText=t.nombre
td.appendChild(bar)

}

dia.setDate(dia.getDate()+1)

}

})

}

tr.appendChild(td)

}

body.appendChild(tr)

}

renderLists()

save()

}

function renderLists(){

let lr=document.getElementById("listaRec")

lr.innerHTML=rec.map((t,i)=>`

<div class="taskItem">

${t.nombre}

<button onclick="delRec(${i})">✕</button>

</div>

`).join("")

let ln=document.getElementById("listaNr")

ln.innerHTML=nr.map((t,i)=>`

<div class="taskItem">

${t.nombre}

<button onclick="delNr(${i})">✕</button>

</div>

`).join("")

}

function delRec(i){

rec.splice(i,1)
generar()

}

function delNr(i){

nr.splice(i,1)
generar()

}

document.getElementById("addRec").onclick=()=>{

rec.push({

nombre:recNombre.value,
inicio:+recInicio.value,
dur:+recDur.value

})

generar()

}

document.getElementById("addNr").onclick=()=>{

nr.push({

nombre:nrNombre.value,
inicio:+nrInicio.value,
dur:+nrDur.value

})

generar()

}

document.getElementById("prev").onclick=()=>{

mes--

if(mes<0){

mes=11
anio--

}

generar()

}

document.getElementById("next").onclick=()=>{

mes++

if(mes>11){

mes=0
anio++

}

generar()

}

document.getElementById("today").onclick=()=>{

let d=new Date()

mes=d.getMonth()
anio=d.getFullYear()

generar()

}

generar()

</script>

</body>
</html>
