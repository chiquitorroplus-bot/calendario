<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Perpetuo Pro - México</title>
    <style>
        :root {
            --bg: #0e0e14;
            --surface: #16161f;
            --border: #2a2a3d;
            --gold: #c9a84c;
            --white: #f0ede6;
            --muted: #6b6b8a;
            --holiday-text: #e05c6a;
        }

        body { background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px;
        }

        select, input, button {
            background: var(--surface); color: var(--white); border: 1px solid var(--border);
            padding: 8px; border-radius: 4px; outline: none;
        }

        button { background: var(--gold); color: var(--bg); font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 1px; background: var(--border); border: 1px solid var(--border);
        }

        .day-header { background: var(--surface); padding: 10px; text-align: center; font-weight: bold; color: var(--gold); }
        .day-cell { background: var(--bg); min-height: 110px; padding: 5px; position: relative; overflow-y: auto; }

        .day-num { font-size: 0.85em; margin-bottom: 5px; display: block; }
        .is-weekend { background: #15151d; }
        .is-holiday-label { color: var(--holiday-text); font-weight: bold; font-size: 0.7em; display: block; margin-top: 2px; }

        /* Estilo Gantt */
        .gantt-item {
            font-size: 0.7em; padding: 3px 6px; margin-bottom: 2px;
            border-radius: 4px; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-weight: 500;
        }

        .data-sections {
            margin-top: 30px; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;
        }

        .section-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .section-card h3 { color: var(--gold); margin-top: 0; font-size: 1em; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .form-group label { font-size: 0.75em; color: var(--muted); text-transform: uppercase; }

        table { width: 100%; font-size: 0.75em; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--gold); padding: 5px; }
        td { padding: 5px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📅 Calendario Planificador</h2>
        <div>
            <select id="monthSel" onchange="renderCalendar()"></select>
            <input type="number" id="yearSel" value="2024" style="width: 85px;" onchange="renderCalendar()">
            <button onclick="renderCalendar()">Actualizar</button>
        </div>
    </header>

    <div id="calendar" class="calendar-grid"></div>

    <div class="data-sections">
        <div class="section-card">
            <h3>🔄 Tareas Recurrentes (Hábiles)</h3>
            <div class="form-group">
                <input type="text" id="recName" placeholder="Nombre de tarea">
                <div style="display:flex; gap:10px">
                    <div style="flex:1"><label>Inicia Hábil #</label><input type="number" id="recStart" value="1" style="width:100%"></div>
                    <div style="flex:1"><label>Duración Días</label><input type="number" id="recDuration" value="1" style="width:100%"></div>
                </div>
                <button onclick="addRec()">+ Agregar Tarea</button>
            </div>
            <table id="tableRec"><thead><tr><th>Tarea</th><th>Inicio</th><th>Dur</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="section-card">
            <h3>📍 Tareas Específicas (Fecha)</h3>
            <div class="form-group">
                <input type="text" id="nonRecName" placeholder="Nombre de tarea">
                <div style="display:flex; gap:10px">
                    <div style="flex:1"><label>Día del mes</label><input type="number" id="nonRecDay" value="1" style="width:100%"></div>
                    <div style="flex:1"><label>Duración</label><input type="number" id="nonRecDuration" value="1" style="width:100%"></div>
                </div>
                <button onclick="addNonRec()">+ Agregar Tarea</button>
            </div>
            <table id="tableNonRec"><thead><tr><th>Tarea</th><th>Día</th><th>Dur</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="section-card">
            <h3>🇲🇽 Días Festivos y Asuetos</h3>
            <div class="form-group">
                <input type="text" id="holName" placeholder="Ej. Cumpleaños">
                <div style="display:flex; gap:10px">
                    <div style="flex:1"><label>Mes</label>
                        <select id="holMonth" style="width:100%"></select>
                    </div>
                    <div style="flex:1"><label>Día</label><input type="number" id="holDay" value="1" style="width:100%"></div>
                </div>
                <button onclick="addHoliday()">+ Agregar Festivo</button>
            </div>
            <table id="tableHol"><thead><tr><th>Desc.</th><th>Mes</th><th>Día</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<script>
    const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const daysArr = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];
    const colors = ["#4caf7d", "#c9a84c", "#4c8dc9", "#a34cc9", "#c94c4c", "#4cc9c9", "#e67e22", "#9b59b6", "#34495e"];

    let dataRec = [];
    let dataNonRec = [];
    let dataHolidays = [
        { name: "Año Nuevo", month: 0, day: 1 },
        { name: "Constitución (Asueto)", month: 1, day: 5, shift: true }, // Se recorre al 1er lunes
        { name: "Benito Juárez", month: 2, day: 21, shift: true }, // Se recorre al 3er lunes
        { name: "Día del Trabajo", month: 4, day: 1 },
        { name: "Independencia", month: 8, day: 16 },
        { name: "Revolución", month: 10, day: 20, shift: true }, // Se recorre al 3er lunes
        { name: "Transmisión Poder", month: 9, day: 1 }, // Solo cada 6 años (ej. 2024)
        { name: "Navidad", month: 11, day: 25 }
    ];

    window.onload = () => {
        const mSel = document.getElementById('monthSel');
        const hMSel = document.getElementById('holMonth');
        months.forEach((m, i) => {
            mSel.innerHTML += `<option value="${i}">${m}</option>`;
            hMSel.innerHTML += `<option value="${i}">${m}</option>`;
        });
        mSel.value = new Date().getMonth();
        renderCalendar();
    };

    function addRec() {
        const color = colors[dataRec.length % colors.length];
        dataRec.push({ name: document.getElementById('recName').value, start: parseInt(document.getElementById('recStart').value), dur: parseInt(document.getElementById('recDuration').value), color });
        renderCalendar();
    }

    function addNonRec() {
        const color = colors[(dataRec.length + dataNonRec.length) % colors.length];
        dataNonRec.push({ name: document.getElementById('nonRecName').value, day: parseInt(document.getElementById('nonRecDay').value), dur: parseInt(document.getElementById('nonRecDuration').value), color });
        renderCalendar();
    }

    function addHoliday() {
        dataHolidays.push({ name: document.getElementById('holName').value, month: parseInt(document.getElementById('holMonth').value), day: parseInt(document.getElementById('holDay').value) });
        renderCalendar();
    }

    // Lógica para determinar si un día es festivo oficial en México (incluyendo los que se recorren)
    function getHolidaysForMonth(year, month) {
        let currentHolidays = [];
        dataHolidays.forEach(h => {
            if (h.month === month) {
                let actualDay = h.day;
                // Lógica de la LFT México para recorrer días
                if (h.shift) {
                    let d = new Date(year, month, 1);
                    if (h.month === 1) { // 1er lunes de febrero
                        while(d.getDay() !== 1) d.setDate(d.getDate() + 1);
                        actualDay = d.getDate();
                    } else if (h.month === 2 || h.month === 10) { // 3er lunes de marzo o nov
                        let count = 0;
                        while(count < 3) {
                            if(d.getDay() === 1) count++;
                            if(count < 3) d.setDate(d.getDate() + 1);
                        }
                        actualDay = d.getDate();
                    }
                }
                currentHolidays.push({ day: actualDay, name: h.name });
            }
        });
        return currentHolidays;
    }

    function renderCalendar() {
        const month = parseInt(document.getElementById('monthSel').value);
        const year = parseInt(document.getElementById('yearSel').value);
        const container = document.getElementById('calendar');
        container.innerHTML = "";

        daysArr.forEach(d => container.innerHTML += `<div class="day-header">${d}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let offset = (firstDay === 0) ? 6 : firstDay - 1;

        for(let i=0; i<offset; i++) container.innerHTML += `<div class="day-cell"></div>`;

        const monthHolidays = getHolidaysForMonth(year, month);
        
        // Identificar días hábiles
        let businessDays = [];
        for(let d=1; d<=daysInMonth; d++) {
            let dt = new Date(year, month, d);
            let isWknd = (dt.getDay() === 0 || dt.getDay() === 6);
            let isHol = monthHolidays.some(h => h.day === d);
            if(!isWknd && !isHol) businessDays.push(d);
        }

        // Crear celdas
        for(let d=1; d<=daysInMonth; d++) {
            let dt = new Date(year, month, d);
            let isWknd = (dt.getDay() === 0 || dt.getDay() === 6);
            let hol = monthHolidays.find(h => h.day === d);
            
            container.innerHTML += `
                <div class="day-cell ${isWknd?'is-weekend':''}" id="day-${d}">
                    <span class="day-num">${d}</span>
                    ${hol ? `<span class="is-holiday-label">${hol.name}</span>` : ''}
                    <div id="tasks-${d}"></div>
                </div>`;
        }

        // Dibujar tareas recurrentes
        dataRec.forEach(t => {
            let startIdx = t.start - 1;
            for(let i=0; i<t.dur; i++) {
                let dayNum = businessDays[startIdx + i];
                if(dayNum) drawTask(dayNum, t.name, t.color);
            }
        });

        // Dibujar tareas no recurrentes
        dataNonRec.forEach(t => {
            for(let i=0; i<t.dur; i++) {
                let d = t.day + i;
                if(d <= daysInMonth) drawTask(d, t.name, t.color);
            }
        });

        updateTables();
    }

    function drawTask(day, name, color) {
        const el = document.getElementById(`tasks-${day}`);
        if(el) el.innerHTML += `<div class="gantt-item" style="background:${color}">${name}</div>`;
    }

    function updateTables() {
        document.querySelector('#tableRec tbody').innerHTML = dataRec.map(d => `<tr><td><span style="color:${d.color}">●</span> ${d.name}</td><td>${d.start}</td><td>${d.dur}</td></tr>`).join('');
        document.querySelector('#tableNonRec tbody').innerHTML = dataNonRec.map(d => `<tr><td><span style="color:${d.color}">●</span> ${d.name}</td><td>${d.day}</td><td>${d.dur}</td></tr>`).join('');
        document.querySelector('#tableHol tbody').innerHTML = dataHolidays.map(d => `<tr><td>${d.name}</td><td>${months[d.month]}</td><td>${d.day}</td></tr>`).join('');
    }
</script>
</body>
</html>
